# Area labels — applied based on which files changed in the PR.
# Type labels (bug, enhancement, etc.) are applied separately from the PR title prefix.

"area: backend":
  - changed-files:
      - any-glob-to-any-file:
          - "backend/**"

"area: frontend":
  - changed-files:
      - any-glob-to-any-file:
          - "static/**"
          - "cipher.html"
          - "encryption python.py"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "README.md"

"area: infra":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "Dockerfile"
          - "docker-compose.yml"
          - "deploy.sh"
          - "requirements.txt"

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "Development"
    groups:
      production-deps:
        dependency-type: "production"
      dev-deps:
        dependency-type: "development"
    labels:
      - "chore"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "Development"
    labels:
      - "chore"
      - "infra"
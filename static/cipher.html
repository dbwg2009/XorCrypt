<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Cipher — Secure</title>

<style>
:root {
  --bg: #1a1a2e;
  --surface: #252540;
  --surface-hi: #2d2d4d;
  --surface-hover: #313157;
  --border: rgba(108, 99, 255, 0.18);
  --border-soft: rgba(255,255,255,0.06);
  --accent: #6c63ff;
  --accent-hi: #8a83ff;
  --accent-dim: rgba(108,99,255,0.15);
  --accent2: #43c9a0;
  --accent2-hi: #5fdcb6;
  --warn: #e05c5c;
  --gold: #e0a030;
  --fg: #e8e8f0;
  --fg-dim: #7a7a99;
  --fg-hi: #ffffff;
  --mono: ui-monospace, monospace;
}

* { box-sizing: border-box; margin:0; padding:0; }

body{
  background: var(--bg);
  color: var(--fg);
  font-family: system-ui, sans-serif;
  min-height:100vh;
}

.shell{
  max-width:920px;
  margin:auto;
  padding:28px 24px 80px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:14px;
  padding:22px;
  margin-bottom:18px;
}

.mode-row{
  display:flex;
  gap:8px;
  margin-bottom:14px;
}

.mode-btn{
  flex:1;
  background:var(--surface-hi);
  border:0;
  border-radius:10px;
  padding:12px;
  color:var(--fg);
  cursor:pointer;
}

.io{
  width:100%;
  min-height:180px;
  max-height:420px;
  overflow-y:auto;

  background:var(--surface-hi);
  border:1px solid transparent;
  border-radius:12px;
  padding:16px;

  font-family:var(--mono);
  font-size:15px;
  line-height:1.7;

  color:var(--fg);
  outline:none;

  transition:border-color .15s, box-shadow .15s;
  -webkit-overflow-scrolling:touch;
}

.io:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-dim);
}

.io::placeholder{
  color:var(--fg-dim);
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:16px;
}

.btn{
  background:var(--surface-hi);
  border:0;
  border-radius:10px;
  padding:12px 18px;
  color:var(--fg);
  cursor:pointer;
}

.btn.primary{
  background:linear-gradient(135deg,var(--accent),#574fdb);
  color:white;
}

.btn.success{
  background:linear-gradient(135deg,var(--accent2),#36a684);
  color:#08110f;
  font-weight:700;
}

/* Chat messages */
.chat-box{
  display:flex;
  flex-direction:column;
  gap:12px;

  max-height:420px;
  overflow-y:auto;

  padding-right:4px;
  margin-top:12px;

  -webkit-overflow-scrolling:touch;
}

.chat-message{
  background:var(--surface-hi);
  border:1px solid var(--border-soft);

  border-radius:14px;
  padding:14px;

  font-size:15px;
  line-height:1.7;

  word-break:break-word;
}

.chat-message.user{
  border-left:4px solid var(--accent);
}

.chat-message.bot{
  border-left:4px solid var(--accent2);
}

.chat-message textarea{
  width:100%;
  min-height:120px;
  max-height:280px;

  overflow-y:auto;
  resize:vertical;

  background:transparent;
  border:0;
  outline:none;

  color:var(--fg);

  font-family:var(--mono);
  font-size:14px;
  line-height:1.6;
}

@media (max-width:700px){

  body{
    font-size:15px;
  }

  .shell{
    padding:12px 10px 50px;
  }

  .card{
    padding:14px;
    border-radius:12px;
  }

  .mode-row{
    flex-direction:column;
  }

  .mode-btn{
    width:100%;
  }

  .actions{
    gap:10px;
  }

  .actions .btn{
    flex:1 1 calc(50% - 10px);
    justify-content:center;

    min-height:46px;

    padding:12px;
    font-size:13px;
  }

  .io{
    min-height:220px;
    max-height:50vh;

    font-size:16px;
    line-height:1.75;
    padding:16px;
  }

  .chat-box{
    max-height:55vh;
  }

  .chat-message textarea{
    font-size:15px;
  }
}
</style>
</head>

<body>

<div class="shell">

  <div class="card">

    <div class="mode-row">
      <button class="mode-btn" id="mode-encrypt">Encrypt</button>
      <button class="mode-btn" id="mode-decrypt">Decrypt</button>
    </div>

    <textarea
      id="input"
      class="io"
      placeholder="Paste messages here..."
    ></textarea>

    <div class="actions">

      <button class="btn primary" id="run">
        Encrypt / Decrypt
      </button>

      <button class="btn" id="encrypt-all">
        Encrypt All
      </button>

      <button class="btn" id="decrypt-all">
        Decrypt All
      </button>

      <button class="btn" id="clear">
        Clear
      </button>

    </div>

  </div>

  <div class="card">

    <textarea
      id="output"
      class="io"
      readonly
      placeholder="Output..."
    ></textarea>

    <div class="actions">
      <button class="btn success" id="copy-out">
        Copy Output
      </button>
    </div>

  </div>

</div>

<script>
"use strict";

const els = {
  input: document.getElementById("input"),
  output: document.getElementById("output"),
  encryptAll: document.getElementById("encrypt-all"),
  decryptAll: document.getElementById("decrypt-all"),
  clear: document.getElementById("clear"),
  copyOut: document.getElementById("copy-out")
};

function toast(msg){
  console.log(msg);
}

async function encryptText(text){
  return "encrypted:" + text;
}

async function decryptToken(text){
  return {
    ok:true,
    text:text.replace("encrypted:","")
  };
}

async function processAllMessages(action){

  const lines = els.input.value
    .split("\\n")
    .filter(v => v.trim().length);

  if(!lines.length){
    toast("No messages found");
    return;
  }

  const out = [];

  for(const line of lines){

    try{

      if(action === "encrypt"){

        const enc = await encryptText(line);
        out.push(enc);

      }else{

        const res = await decryptToken(line);

        if(res.ok) out.push(res.text);
        else out.push("[FAILED] " + line);

      }

    }catch{
      out.push("[ERROR] " + line);
    }
  }

  els.output.value = out.join("\\n\\n");

  toast(
    (action === "encrypt" ? "Encrypted " : "Decrypted ")
    + out.length +
    " messages"
  );
}

els.encryptAll.addEventListener("click", () => {
  processAllMessages("encrypt");
});

els.decryptAll.addEventListener("click", () => {
  processAllMessages("decrypt");
});

els.clear.addEventListener("click", () => {
  els.input.value = "";
  els.output.value = "";
});

els.copyOut.addEventListener("click", async () => {
  await navigator.clipboard.writeText(els.output.value);
});
</script>

</body>
</html>
